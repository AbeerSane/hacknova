<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Health Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#F8FAFC;
color:#333;
}

.dashboard-container{
display:grid;
grid-template-columns:1fr 300px;
gap:2rem;
min-height:100vh;
padding:2rem;
}

.card{
background:white;
border-radius:1.5rem;
padding:1.5rem;
}

.sidebar{
background:white;
border-radius:1.5rem;
padding:1.5rem;
display:flex;
flex-direction:column;
gap:1.5rem;
}

.profile-picture{
width:80px;
height:80px;
border-radius:50%;
border:3px solid #66CC99;
}

.sos-button{
position:fixed;
bottom:2rem;
right:2rem;
background:red;
color:white;
padding:1rem 1.5rem;
border-radius:999px;
font-weight:bold;
}

.dark-mode{
background:#1a1a1a;
color:white;
}

</style>
</head>

<body>

<div class="dashboard-container">

<!-- MAIN CONTENT -->

<div>

<div class="flex justify-between items-center">

<div class="flex items-center gap-2">
<i class="fa-solid fa-h text-2xl text-teal-500"></i>
<span class="text-xl font-semibold">HealthApp</span>
</div>

<div class="flex items-center gap-4">

<button id="theme-toggle">
<i class="fas fa-moon"></i>
</button>

<div class="w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center">
<i class="fa-solid fa-user"></i>
</div>

</div>

</div>

<!-- GREETING -->

<div class="mt-8">

<h1 class="text-5xl font-bold">
Hi Muskan 👋 <br>
Check Your Health
</h1>

<div class="mt-6 flex gap-3">

<button onclick="addVital()" class="bg-teal-500 text-white px-5 py-2 rounded-lg">
Add Health Data
</button>

<button onclick="loadVitals()" class="bg-gray-800 text-white px-5 py-2 rounded-lg">
Refresh
</button>

</div>

</div>

<!-- HEART RATE -->

<div class="grid grid-cols-2 gap-4 mt-8">

<div class="card">

<h3 class="font-semibold text-lg mb-3">
Heart Rate
</h3>

<p class="text-4xl font-bold text-teal-500" id="heartRate">
--
</p>

</div>

<!-- SPO2 -->

<div class="card">

<h3 class="font-semibold text-lg mb-3">
Blood Oxygen
</h3>

<p class="text-4xl font-bold text-green-500" id="bloodCells">
--
</p>

</div>

<!-- TEMPERATURE -->

<div class="card">

<h3 class="font-semibold text-lg mb-3">
Temperature
</h3>

<p class="text-4xl font-bold text-orange-500" id="sleepHours">
--
</p>

</div>

<!-- BLOOD PRESSURE -->

<div class="card">

<h3 class="font-semibold text-lg mb-3">
Blood Pressure
</h3>

<p class="text-4xl font-bold text-blue-500" id="steps">
--
</p>

</div>

</div>

</div>


<!-- SIDEBAR -->

<div class="sidebar shadow">

<div class="flex flex-col items-center text-center">

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRWFtPHJSqOP7-yJJIEw-UAbQYjWMdLA5oWw&s"
class="profile-picture">

<h4 class="text-xl font-semibold mt-2">
Muskan
</h4>

<p class="text-gray-500 text-sm">
muskan.sharma@example.com
</p>

</div>

</div>

</div>


<!-- SOS BUTTON -->

<button onclick="sendSOS()" class="sos-button">

<i class="fas fa-exclamation-triangle"></i>

SOS

</button>



<script>

const themeToggle=document.getElementById("theme-toggle")
const body=document.body

const currentTheme=localStorage.getItem("theme")

if(currentTheme){
body.classList.add(currentTheme)
}

themeToggle.addEventListener("click",()=>{

if(body.classList.contains("dark-mode")){

body.classList.remove("dark-mode")
localStorage.setItem("theme","light-mode")

}else{

body.classList.add("dark-mode")
localStorage.setItem("theme","dark-mode")

}

})



// LOAD VITAL DATA

async function loadVitals(){

try{

const res=await fetch("http://localhost:5000/api/vitals/123")

const data=await res.json()

if(data.length>0){

const v=data[data.length-1]

document.getElementById("heartRate").innerText=v.heartRate
document.getElementById("bloodCells").innerText=v.spo2
document.getElementById("sleepHours").innerText=v.temperature
document.getElementById("steps").innerText=v.bloodPressure

}

}catch(err){

console.log(err)

}

}



// ADD NEW VITAL DATA

async function addVital(){

const heartRate=prompt("Enter Heart Rate")
const spo2=prompt("Enter SPO2")
const temperature=prompt("Enter Temperature")
const bloodPressure=prompt("Enter Blood Pressure")

const data={
userId:"123",
heartRate,
spo2,
temperature,
bloodPressure
}

await fetch("http://localhost:5000/api/vitals/add",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

alert("Health Data Saved")

loadVitals()

}



// SOS ALERT

async function sendSOS(){

await fetch("http://localhost:5000/api/sos",{

method:"POST"

})

alert("Emergency Alert Sent")

}


// LOAD DATA ON PAGE START

loadVitals()

</script>


</body>
</html>
